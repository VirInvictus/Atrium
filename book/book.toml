[book]
title = "Atrium"
description = "A native GNOME task manager: Org-mode internals wrapped in a Things 3 / OmniFocus surface."
authors = ["Brandon LaRocque"]
language = "en"
src = "src"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/VirInvictus/Atrium"
edit-url-template = "https://github.com/VirInvictus/Atrium/edit/main/book/{path}"

[output.html.fold]
enable = true
level = 1
