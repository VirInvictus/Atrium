name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    # Atrium requires gtk4 >= 4.16; Ubuntu runners ship 4.14, so the build
    # aborts in gdk4-sys. Fedora carries a new-enough GTK and matches the
    # project's actual target environment.
    container: fedora:latest
    steps:
      - name: Install system dependencies
        run: |
          dnf install -y \
            gcc \
            git \
            pkgconf-pkg-config \
            glib2-devel \
            gtk4-devel \
            sqlite-devel \
            xorg-x11-server-Xvfb

      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        # The GTK binary crate's tests call gtk::init(), which needs a display.
        env:
          GDK_BACKEND: x11
        run: xvfb-run -a cargo test --workspace
